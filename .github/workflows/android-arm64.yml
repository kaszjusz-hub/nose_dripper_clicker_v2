name: Android ARM64 Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  build-android-arm64:
    name: Build Android ARM64 (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ env.GH_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Android deps
        run: |
          flutter config --enable-android
          echo "y" | sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Build ARM64 APK
        run: |
          flutter build apk --arch arm64-v8a --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Attach to Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          apk_path="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          gh release upload "${GITHUB_REF_NAME}" "$apk_path" --clobber || echo "Upload skipped or failed"