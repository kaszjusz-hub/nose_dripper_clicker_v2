name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analysis.log || true
        continue-on-error: true

      - name: Check for errors
        run: |
          if grep -q "error •" /tmp/analysis.log; then
            echo "❌ Build errors found:"
            grep "error •" /tmp/analysis.log
            exit 1
          else
            echo "✅ No build errors (infos/warnings ignored)"
          fi

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
